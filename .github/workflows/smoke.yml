name: Smoke Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress smoke tests
        run: npm run cy:smoke
